kind = "web"
previewPath = "/"
title = "Chess Academy"
version = "1.0.0"
id = "artifacts/chess-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19953
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chess-academy run dev"

[services.env]
PORT = "19953"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chess-academy", "run", "build"]
publicDir = "artifacts/chess-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
